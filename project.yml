name: HockeyConnect
options:
  bundleIdPrefix: com.hockeyconnect
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ALWAYS_SEARCH_USER_PATHS: NO

packages:
  FirebaseAnalytics:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  HockeyConnect:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HockeyConnect
    info:
      path: HockeyConnect/Info.plist
      properties:
        CFBundleName: HockeyConnect
        CFBundleDisplayName: HockeyConnect
        CFBundleIdentifier: com.hockeyconnect.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSLocationWhenInUseUsageDescription: Location is used to show nearby rinks.
        NSUserNotificationsUsageDescription: Notifications alert you when games match your skill level.
    entitlements:
      path: HockeyConnect/HockeyConnect.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_NAME: HockeyConnect
        PRODUCT_BUNDLE_IDENTIFIER: com.hockeyconnect.app
        INFOPLIST_FILE: HockeyConnect/Info.plist
        CODE_SIGN_ENTITLEMENTS: HockeyConnect/HockeyConnect.entitlements
    dependencies:
      - package: FirebaseAnalytics
        product: FirebaseAuth
      - package: FirebaseAnalytics
        product: FirebaseFirestore
      - package: FirebaseAnalytics
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn

  HockeyConnectTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HockeyConnectTests
    dependencies:
      - target: HockeyConnect
